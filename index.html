<div id="adminOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;backdrop-filter:blur(6px);" onclick="if(event.target===this)closeAdminPanel()"></div>
<div id="adminPanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(520px,94vw);background:#1c1b1b;border:1px solid rgba(212,175,55,0.3);border-radius:1rem;z-index:1000;padding:2rem;box-shadow:0 0 60px rgba(212,175,55,0.1);">

  </div>

      <button onclick="checkAdminPass()" style="background:linear-gradient(135deg,#f2ca50,#d4af37);color:#241a00;border:none;border-radius:0.5rem;padding:0.75rem 1.25rem;font-weight:700;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;">Login</button>
    </div>
    <p id="loginError" style="color:#ff6b6b;font-size:0.8rem;margin-top:0.5rem;display:none;">Wrong password. Try again.</p>
  </div>
  <div id="pricingEditor" style="display:none;">
    <p style="font-size:0.8rem;color:#d0c5af;margin-bottom:1.5rem;">Changes appear live on the Pricing page.</p>
    <div style="background:#2a2a2a;border-radius:0.75rem;padding:1.25rem;margin-bottom:1rem;border:1px solid rgba(153,144,124,0.15);">
      <p style="font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:#d4af37;margin-bottom:0.75rem;">Package 1</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
        <div><label style="font-size:0.6rem;color:#99907c;display:block;margin-bottom:0.3rem;">Name</label><input id="p1name" type="text" style="width:100%;background:#131313;border:1px solid rgba(153,144,124,0.2);border-radius:0.4rem;padding:0.6rem;color:#e5e2e1;font-size:0.85rem;outline:none;"/></div>
        <div><label style="font-size:0.6rem;color:#99907c;display:block;margin-bottom:0.3rem;">Price (Rs)</label><input id="p1price" type="number" style="width:100%;background:#131313;border:1px solid rgba(153,144,124,0.2);border-radius:0.4rem;padding:0.6rem;color:#e5e2e1;font-size:0.85rem;outline:none;"/></div>
        <div style="grid-column:1/-1;"><label style="font-size:0.6rem;color:#99907c;display:block;margin-bottom:0.3rem;">Description</label><input id="p1desc" type="text" style="width:100%;background:#131313;border:1px solid rgba(153,144,124,0.2);border-radius:0.4rem;padding:0.6rem;color:#e5e2e1;font-size:0.85rem;outline:none;"/></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
        <div><label style="font-size:0.6rem;color:#99907c;display:block;margin-bottom:0.3rem;">Name</label><input id="p2name" type="text" style="width:100%;background:#131313;border:1px solid rgba(153,144,124,0.2);border-radius:0.4rem;padding:0.6rem;color:#e5e2e1;font-size:0.85rem;outline:none;"/></div>
        <div><label style="font-size:0.6rem;color:#99907c;display:block;margin-bottom:0.3rem;">Price (Rs)</label><input id="p2price" type="number" style="width:100%;background:#131313;border:1px solid rgba(153,144,124,0.2);border-radius:0.4rem;padding:0.6rem;color:#e5e2e1;font-size:0.85rem;outline:none;"/></div>
        <div style="grid-column:1/-1;"><label style="font-size:0.6rem;color:#99907c;display:block;margin-bottom:0.3rem;">Description</label><input id="p2desc" type="text" style="width:100%;background:#131313;border:1px solid rgba(153,144,124,0.2);border-radius:0.4rem;padding:0.6rem;color:#e5e2e1;font-size:0.85rem;outline:none;"/></div>
      </div>
    </div>
    <div style="background:#2a2a2a;border-radius:0.75rem;padding:1.25rem;margin-bottom:1.5rem;border:1px solid rgba(153,144,124,0.15);">
      <p style="font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:#d4af37;margin-bottom:0.75rem;">Package 3</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
        <div><label style="font-size:0.6rem;color:#99907c;display:block;margin-bottom:0.3rem;">Name</label><input id="p3name" type="text" style="width:100%;background:#131313;border:1px solid rgba(153,144,124,0.2);border-radius:0.4rem;padding:0.6rem;color:#e5e2e1;font-size:0.85rem;outline:none;"/></div>
        <div><label style="font-size:0.6rem;color:#99907c;display:block;margin-bottom:0.3rem;">Price (Rs)</label><input id="p3price" type="number" style="width:100%;background:#131313;border:1px solid rgba(153,144,124,0.2);border-radius:0.4rem;padding:0.6rem;color:#e5e2e1;font-size:0.85rem;outline:none;"/></div>
        <div style="grid-column:1/-1;"><label style="font-size:0.6rem;color:#99907c;display:block;margin-bottom:0.3rem;">Description</label><input id="p3desc" type="text" style="width:100%;background:#131313;border:1px solid rgba(153,144,124,0.2);border-radius:0.4rem;padding:0.6rem;color:#e5e2e1;font-size:0.85rem;outline:none;"/></div>

    </div>
    <p id="saveMsg" style="text-align:center;color:#4caf50;font-size:0.8rem;margin-top:0.75rem;display:none;">Prices saved! Pricing page updated.</p>
  </div>

<script>
const ADMIN_PASS='GURUDEV2026';
const DEFAULT_PRICES={p1name:'Essentials',p1price:5000,p1desc:'Perfect for portraits and intimate moments.',p2name:'Signature',p2price:12000,p2desc:'Our most popular package for pre-wedding and events.',p3name:'Legacy',p3price:25000,p3desc:'Full-day coverage for weddings and grand celebrations.'};
function openAdminPanel(){document.getElementById('adminOverlay').style.display='block';document.getElementById('adminPanel').style.display='block';document.getElementById('adminLogin').style.display='block';document.getElementById('pricingEditor').style.display='none';document.getElementById('adminPass').value='';document.getElementById('loginError').style.display='none';}
function closeAdminPanel(){document.getElementById('adminOverlay').style.display='none';document.getElementById('adminPanel').style.display='none';}
function checkAdminPass(){if(document.getElementById('adminPass').value===ADMIN_PASS){document.getElementById('adminLogin').style.display='none';document.getElementById('pricingEditor').style.display='block';loadPricingFields();}else{document.getElementById('loginError').style.display='block';}}
function loadPricingFields(){const s=JSON.parse(localStorage.getItem('gurudevPricing')||'null')||DEFAULT_PRICES;['1','2','3'].forEach(i=>{document.getElementById('p'+i+'name').value=s['p'+i+'name'];document.getElementById('p'+i+'price').value=s['p'+i+'price'];document.getElementById('p'+i+'desc').value=s['p'+i+'desc'];});}
function savePricing(){const d={};['1','2','3'].forEach(i=>{d['p'+i+'name']=document.getElementById('p'+i+'name').value;d['p'+i+'price']=parseInt(document.getElementById('p'+i+'price').value);d['p'+i+'desc']=document.getElementById('p'+i+'desc').value;});localStorage.setItem('gurudevPricing',JSON.stringify(d));const m=document.getElementById('saveMsg');m.style.display='block';setTimeout(()=>m.style.display='none',3000);}
function resetPricing(){if(confirm('Reset prices to defaults?')){localStorage.removeItem('gurudevPricing');loadPricingFields();}}
</script>
